#version: "3.9"

services:
  frontend:
    build: ../apps/frontend
    container_name: next_frontend
    restart: always
    expose:
      - "3000"
    environment:
      - NODE_ENV=${NODE_ENV}
      #- API_URL=http://host.docker.internal:1337

    networks:
      - app_network

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000', res => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    depends_on:
      - postgres

  postgres:
    image: docker.io/postgres:17
    container_name: app_postgres
    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - app_network

  nginx:
    image: docker.io/nginx:1.28.0
    container_name: app_nginx
    restart: always

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - frontend

    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:

