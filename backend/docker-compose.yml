#version: "3.9"

services:
  nodejs:
    build: ./nodejs
    volumes:
      - ./nodejs:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "3000:3000"

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: devdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
